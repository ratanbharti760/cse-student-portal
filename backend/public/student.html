<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - CSE Department</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <header>
        <div>
            <h1>🎓 CSE Department <span>Student Portal</span></h1>
            <p>Central Academic Resource Planning System</p>
        </div>
        <a href="/" class="btn btn-accent btn-sm" style="max-width: 150px;">Exit Portal</a>
    </header>

    <div class="container-fluid px-4 mt-4">
        <div class="row">
            
            <div class="col-lg-3 col-md-4 col-12 mb-4">
                <div class="card p-4 shadow-sm">
                    <h5 class="mb-3 text-primary fw-bold">Lookup Academic Profile</h5>
                    <div class="form-group mb-3">
                        <label for="regNo">Enter Registration Number</label>
                        <input type="text" id="regNo" class="form-control" placeholder="e.g., CSE-2026-01">
                    </div>
                    <button onclick="searchStudent()" class="btn btn-primary w-100 mb-3">Query Database</button>
                    <button onclick="downloadPDF()" class="btn btn-success w-100">💾 Download Transcript (PDF)</button>
                </div>
            </div>

            <div class="col-lg-9 col-md-8 col-12">
                
                <div class="card p-4 shadow-sm mb-4" id="studentInfoCard">
                    <h4 class="text-primary fw-bold mb-3" id="studentName">-</h4>
                    <p class="text-muted">
                        <strong>Reg No:</strong> <span id="studentReg">-</span> | 
                        <strong>Semester:</strong> <span id="studentSem">-</span> | 
                        <strong>Branch:</strong> <span id="studentBranch">-</span>
                    </p>
                </div>

                <div class="card p-4 shadow-sm">
                    <h5 class="text-primary fw-bold mb-3">Examination & Evaluation Marks Ledger</h5>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>Course Subject</th>
                                    <th>Internal (40)</th>
                                    <th>External (60)</th>
                                    <th>Aggregate Total</th>
                                </tr>
                            </thead>
                            <tbody id="marksTableBody">
                                <tr>
                                    <td colspan="4" class="text-center text-muted">Enter registration number to view data.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
